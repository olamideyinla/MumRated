<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriManagerX — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #2D6A4F;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.95rem; opacity: 0.85; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #DAA520;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌾</div>
    <h1>You're offline</h1>
    <p>AgriManagerX works offline. Your data is saved locally and will sync when you reconnect.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
