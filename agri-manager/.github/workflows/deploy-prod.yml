name: Deploy Production

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build → Deploy Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build (production)
        run: npm run build:production
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_ENV: production
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.PROD_PLAUSIBLE_DOMAIN }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Setup Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `AgriManagerX ${tag}`,
              body: `Production deployment: ${{ steps.deploy.outputs.deployment_url }}\n\nSee CHANGELOG.md for details.`,
              draft: false,
              prerelease: false,
            })

      - name: Smoke test production URL
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deployment_url }}")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"
